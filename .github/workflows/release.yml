name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write    # To create the GitHub Release
  id-token: write   # To prove the package came from this repo (Provenance)

env:
  GO_VERSION: '1.26'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          install-mode: goinstall

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: testdb

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            cgo: 1
          - goos: linux
            goarch: arm64
            ext: ''
            cgo: 1
          - goos: darwin
            goarch: amd64
            ext: ''
            cgo: 0
          - goos: darwin
            goarch: arm64
            ext: ''
            cgo: 0
          - goos: windows
            goarch: amd64
            ext: '.exe'
            cgo: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compiler for ARM64
        if: matrix.cgo == 1 && matrix.goarch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          CC: ${{ matrix.cgo == 1 && matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          OUTPUT_NAME="dataset-cli-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$OUTPUT_NAME" .

      - name: Compute checksums
        run: |
          PLATFORM="${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            PLATFORM="${PLATFORM}.exe"
          fi
          sha256sum "dataset-cli-${PLATFORM}" > "dataset-cli-${PLATFORM}.sha256"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: dataset-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dataset-cli-*
            *.sha256
          retention-days: 30

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/dataset-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare artifacts
        run: |
          cd dist
          for dir in */; do
            mv "$dir"* . 2>/dev/null || true
          done
          rm -rf dataset-cli-*/

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:'%h %s' --since="30 days ago" | head -20 | sed 's/^/- /')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Dataset CLI ${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            Download the binary for your platform from the assets below.
          files: |
            dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [release] # Only run after the GitHub Release is successful
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Recommended for 2026 provenance
          registry-url: 'https://registry.npmjs.org'

      - name: Generate NPM Package
        run: |
          mkdir -p npm-package/bin npm-package/scripts
          
          cp README.md npm-package/
          
          cat <<EOF > npm-package/package.json
          {
            "name": "dataset-cli",
            "version": "${GITHUB_REF#refs/tags/v}",
            "description": "Dataset processing CLI tool",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/${{ github.repository }}.git"
            },
            "bin": {
              "dataset-cli": "./bin/launcher.js"
            },
            "scripts": {
              "postinstall": "node ./scripts/install.js"
            },
            "files": [
              "bin/",
              "scripts/",
              "README.md"
            ]
          }
          EOF
          
          cp bin/launcher.js npm-package/bin/
          cp scripts/install.js npm-package/scripts/
          chmod +x npm-package/bin/launcher.js
          chmod +x npm-package/scripts/install.js

      - name: Publish to NPM
        working-directory: npm-package
        # We add --no-git-checks to prevent NPM from looking for a git repo inside the subfolder
        run: npm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true