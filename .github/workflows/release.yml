name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write    # To create the GitHub Release
  id-token: write   # To prove the package came from this repo (Provenance)

env:
  GO_VERSION: '1.26'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          install-mode: goinstall

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: testdb

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            cgo: 1
          - goos: linux
            goarch: arm64
            ext: ''
            cgo: 1
          - goos: darwin
            goarch: amd64
            ext: ''
            cgo: 0
          - goos: darwin
            goarch: arm64
            ext: ''
            cgo: 0
          - goos: windows
            goarch: amd64
            ext: '.exe'
            cgo: 0
          - goos: windows
            goarch: arm64
            ext: '.exe'
            cgo: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compiler for ARM64
        if: matrix.cgo == 1 && matrix.goarch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          CC: ${{ matrix.cgo == 1 && matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          OUTPUT_NAME="dataset-cli-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$OUTPUT_NAME" .

      - name: Compute checksums
        run: |
          PLATFORM="${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            PLATFORM="${PLATFORM}.exe"
          fi
          sha256sum "dataset-cli-${PLATFORM}" > "dataset-cli-${PLATFORM}.sha256"

      - name: Verify build outputs
        run: |
          BINARY="dataset-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          CHECKSUM="${BINARY}.sha256"
          
          echo "=== Verifying build outputs ==="
          echo "Binary: $BINARY"
          ls -lh "$BINARY"
          
          echo "Checksum: $CHECKSUM"
          ls -lh "$CHECKSUM"
          cat "$CHECKSUM"
          
          # Verify checksum is not empty
          if [ ! -s "$CHECKSUM" ]; then
            echo "ERROR: Checksum file is empty!"
            exit 1
          fi
          
          # Verify binary size is reasonable (at least 1MB)
          BINARY_SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY" 2>/dev/null)
          if [ "$BINARY_SIZE" -lt 1000000 ]; then
            echo "ERROR: Binary seems too small ($BINARY_SIZE bytes)!"
            exit 1
          fi
          
          echo "=== Verification passed ==="

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: dataset-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dataset-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            dataset-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256
          retention-days: 30

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/dataset-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare artifacts
        run: |
          cd dist
          DIST_DIR=$(pwd)
          
          echo "=== Before merge - checking directory structure ==="
          find . -type f | head -30
          echo ""
          
          # First, rename directories to avoid name collisions
          # Then copy files out
          i=0
          for dir in */; do
            if [ -d "$dir" ]; then
              # Create a unique temp name for each directory
              TEMP_NAME="artifact_$i"
              echo "Renaming $dir to $TEMP_NAME/"
              mv "$dir" "$TEMP_NAME/"
              
              # Copy all files from the renamed directory
              for file in "$TEMP_NAME"/*; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file")
                  echo "Copying: $file -> $DIST_DIR/$filename"
                  cp "$file" "$DIST_DIR/$filename"
                fi
              done
              
              # Remove the temp directory
              rm -rf "$TEMP_NAME/"
              i=$((i + 1))
            fi
          done
          
          echo ""
          echo "=== After merge - files in dist/ ==="
          ls -la
          echo ""
          
          echo "=== Checking release artifacts ==="
          echo "Expected files (12 total: 6 binaries + 6 checksums):"
          echo ""
          echo "Binaries:"
          echo "  - dataset-cli-linux-amd64"
          echo "  - dataset-cli-linux-arm64"
          echo "  - dataset-cli-darwin-amd64"
          echo "  - dataset-cli-darwin-arm64"
          echo "  - dataset-cli-windows-amd64.exe"
          echo "  - dataset-cli-windows-arm64.exe"
          echo ""
          echo "Checksums:"
          echo "  - dataset-cli-linux-amd64.sha256"
          echo "  - dataset-cli-linux-arm64.sha256"
          echo "  - dataset-cli-darwin-amd64.sha256"
          echo "  - dataset-cli-darwin-arm64.sha256"
          echo "  - dataset-cli-windows-amd64.exe.sha256"
          echo "  - dataset-cli-windows-arm64.exe.sha256"
          echo ""
          
          # Count total files
          COUNT=$(ls dataset-cli-* 2>/dev/null | wc -l)
          echo "Total files found: $COUNT"
          
          # Check for 12 files (6 binaries + 6 checksums)
          if [ "$COUNT" -ne 12 ]; then
            echo "ERROR: Found $COUNT files, expected 12 files (6 binaries + 6 checksums)!"
            echo "Missing files:"
            for expected in dataset-cli-linux-amd64 dataset-cli-linux-arm64 dataset-cli-darwin-amd64 dataset-cli-darwin-arm64 dataset-cli-windows-amd64.exe dataset-cli-windows-arm64.exe dataset-cli-linux-amd64.sha256 dataset-cli-linux-arm64.sha256 dataset-cli-darwin-amd64.sha256 dataset-cli-darwin-arm64.sha256 dataset-cli-windows-amd64.exe.sha256 dataset-cli-windows-arm64.exe.sha256; do
              if [ ! -f "$expected" ]; then
                echo "  - $expected (MISSING)"
              fi
            done
            exit 1
          fi
          
          # Verify all binaries exist and have reasonable size (>1MB)
          echo ""
          echo "Verifying binaries exist and are non-empty:"
          for binary in dataset-cli-linux-amd64 dataset-cli-linux-arm64 dataset-cli-darwin-amd64 dataset-cli-darwin-arm64 dataset-cli-windows-amd64.exe dataset-cli-windows-arm64.exe; do
            if [ -f "$binary" ]; then
              SIZE=$(stat -c%s "$binary" 2>/dev/null || stat -f%z "$binary" 2>/dev/null)
              SIZE_HUMAN=$(ls -lh "$binary" | awk '{print $5}')
              if [ "$SIZE" -gt 1000000 ]; then
                echo "  ✓ $binary ($SIZE_HUMAN, $SIZE bytes)"
              else
                echo "  ✗ $binary (too small: $SIZE bytes, expected >1MB)"
                exit 1
              fi
            else
              echo "  ✗ $binary (MISSING)"
              exit 1
            fi
          done
          
          # Verify all checksums exist and are non-empty
          echo ""
          echo "Verifying checksums exist and are non-empty:"
          for checksum in dataset-cli-linux-amd64.sha256 dataset-cli-linux-arm64.sha256 dataset-cli-darwin-amd64.sha256 dataset-cli-darwin-arm64.sha256 dataset-cli-windows-amd64.exe.sha256 dataset-cli-windows-arm64.exe.sha256; do
            if [ -f "$checksum" ]; then
              SIZE=$(wc -c < "$checksum")
              CONTENT=$(cat "$checksum")
              if [ "$SIZE" -gt 50 ] && [ -n "$CONTENT" ]; then
                echo "  ✓ $checksum ($SIZE bytes)"
              else
                echo "  ✗ $checksum (empty or too small: $SIZE bytes)"
                echo "     Content: $CONTENT"
                exit 1
              fi
            else
              echo "  ✗ $checksum (MISSING)"
              exit 1
            fi
          done
          
          echo ""
          echo "=== All verification passed! ==="

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:'%h %s' --since="30 days ago" | head -20 | sed 's/^/- /')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Dataset CLI ${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            Download the binary for your platform from the assets below.
          files: |
            dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [release] # Only run after the GitHub Release is successful
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Recommended for 2026 provenance
          registry-url: 'https://registry.npmjs.org'

      - name: Generate NPM Package
        run: |
          mkdir -p npm-package/bin npm-package/scripts
          
          cp README.md npm-package/
          
          cat <<EOF > npm-package/package.json
          {
            "name": "dataset-cli",
            "version": "${GITHUB_REF#refs/tags/v}",
            "description": "Dataset processing CLI tool",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/${{ github.repository }}.git"
            },
            "bin": "bin/launcher.js",
            "scripts": {
              "postinstall": "node scripts/install.js"
            },
            "files": [
              "bin/",
              "scripts/",
              "README.md"
            ]
          }
          EOF
          
          cp bin/launcher.js npm-package/bin/
          cp scripts/install.js npm-package/scripts/
          chmod +x npm-package/bin/launcher.js
          chmod +x npm-package/scripts/install.js

      - name: Publish to NPM
        working-directory: npm-package
        # We add --no-git-checks to prevent NPM from looking for a git repo inside the subfolder
        run: npm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  test-release:
    name: Test Release Binaries
    runs-on: ${{ matrix.os }}
    needs: [release]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: dataset-cli-linux-amd64
            ext: ''
          - os: windows-latest
            binary: dataset-cli-windows-amd64.exe
            ext: '.exe'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download binary
        run: |
          curl -L -o "${{ matrix.binary }}" \
            "https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/${{ matrix.binary }}"
          chmod +x "${{ matrix.binary }}"

      - name: Verify binary
        run: |
          echo "=== Testing ${{ matrix.binary }} ==="
          echo ""
          echo "File info:"
          ls -lh "${{ matrix.binary }}"
          file "${{ matrix.binary }}" 2>/dev/null || echo "file command not available"
          echo ""
          
          echo "Binary help output:"
          "./${{ matrix.binary }}" --help || echo "Binary may not support --help"
          echo ""
          
          echo "Binary version:"
          "./${{ matrix.binary }}" version 2>/dev/null || echo "Version command may not exist"
          echo ""
          
          echo "=== Test passed ==="